<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960">
  <defs>
    <radialGradient id="sky" cx="12%" cy="6%" r="46%">
      <stop offset="0" stop-color="#b9d6dc" stop-opacity=".55"/>
      <stop offset="1" stop-color="#faf8f2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coral" cx="94%" cy="0%" r="42%">
      <stop offset="0" stop-color="#d88773" stop-opacity=".32"/>
      <stop offset="1" stop-color="#faf8f2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#466b4c"/>
      <stop offset="1" stop-color="#7e9a83"/>
    </linearGradient>
    <linearGradient id="visual" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dfe8dc"/>
      <stop offset=".58" stop-color="#f7e1d4"/>
      <stop offset="1" stop-color="#c9dee1"/>
    </linearGradient>
    <linearGradient id="bodyShape" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f3d3c6"/>
      <stop offset=".3" stop-color="#f3d3c6"/>
      <stop offset=".31" stop-color="#e8f0e6"/>
      <stop offset="1" stop-color="#e8f0e6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#3a4335" flood-opacity=".16"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#466b4c" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect width="1440" height="960" fill="#faf8f2"/>
  <rect width="1440" height="960" fill="url(#sky)"/>
  <rect width="1440" height="960" fill="url(#coral)"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="0" y="0" width="1440" height="78" fill="#faf8f2" opacity=".70"/>
    <g transform="translate(64 18)">
      <rect width="44" height="44" rx="14" fill="url(#mark)" filter="url(#softShadow)"/>
      <text x="22" y="28" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">MS</text>
      <text x="60" y="28" font-size="18" font-weight="800" fill="#20231f">Марина Соколова</text>
    </g>
    <text x="938" y="47" font-size="15" fill="#6a7068">Услуги</text>
    <text x="1014" y="47" font-size="15" fill="#6a7068">Запись</text>
    <text x="1092" y="47" font-size="15" fill="#6a7068">Контакты</text>
    <rect x="1190" y="18" width="154" height="44" rx="22" fill="#466b4c" filter="url(#softShadow)"/>
    <text x="1267" y="46" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">Записаться</text>

    <g transform="translate(64 196)">
      <text x="0" y="0" font-size="14" font-weight="800" fill="#466b4c">Подология и эстетика стоп</text>
      <text x="0" y="106" font-family="Georgia, Times New Roman, serif" font-size="94" fill="#20231f">Здоровые</text>
      <text x="0" y="196" font-family="Georgia, Times New Roman, serif" font-size="94" fill="#20231f">стопы без</text>
      <text x="0" y="286" font-family="Georgia, Times New Roman, serif" font-size="94" fill="#20231f">неловкости</text>
      <text x="0" y="350" font-size="21" fill="#6a7068">Бережный медицинский педикюр, обработка трещин,</text>
      <text x="0" y="385" font-size="21" fill="#6a7068">мозолей и вросших ногтей в спокойном кабинете</text>
      <text x="0" y="420" font-size="21" fill="#6a7068">с понятным планом ухода.</text>
      <rect x="0" y="474" width="164" height="48" rx="24" fill="#466b4c" filter="url(#softShadow)"/>
      <text x="82" y="504" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">Выбрать время</text>
      <rect x="178" y="474" width="170" height="48" rx="24" fill="#fff" opacity=".62" stroke="#d8d8cc"/>
      <text x="263" y="504" text-anchor="middle" font-size="16" font-weight="800" fill="#20231f">Смотреть услуги</text>
    </g>

    <g transform="translate(816 150)" filter="url(#shadow)">
      <rect width="500" height="620" rx="32" fill="url(#visual)"/>
      <path d="M78 52 H422 Q432 52 432 62 V536 Q432 552 416 552 H84 Q68 552 68 536 V228 Q68 52 250 52 Z" fill="url(#bodyShape)" opacity=".92"/>
      <circle cx="250" cy="178" r="46" fill="#fff" opacity=".72"/>
      <g transform="translate(206 412)">
        <path d="M0 44 C34 8 70 0 110 20 C145 37 174 76 168 116 C162 160 104 176 58 156 C16 138 -28 76 0 44Z" fill="#f7c6b7" opacity=".8"/>
        <path d="M44 42 C66 24 98 26 120 48" stroke="#466b4c" stroke-width="8" stroke-linecap="round" opacity=".5"/>
      </g>
      <g transform="translate(248 494)">
        <rect width="222" height="92" rx="22" fill="#fff" opacity=".76" stroke="#fff"/>
        <text x="18" y="34" font-size="17" font-weight="800" fill="#20231f">Стерильные инструменты</text>
        <text x="18" y="60" font-size="13" fill="#6a7068">Одноразовые расходники,</text>
        <text x="18" y="78" font-size="13" fill="#6a7068">мягкая диагностика и уход.</text>
      </g>
    </g>

    <g transform="translate(64 840)">
      <text x="0" y="0" font-family="Georgia, Times New Roman, serif" font-size="50" fill="#20231f">Что можно решить</text>
      <text x="560" y="-12" font-size="19" fill="#6a7068">Фокус на комфорте, гигиене и заметном результате</text>
      <text x="560" y="20" font-size="19" fill="#6a7068">уже после первого визита.</text>
    </g>
  </g>
</svg>
